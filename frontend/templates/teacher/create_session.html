<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Create Session</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <h2>Create Session</h2>
  <form method="post">
    <label>Course</label>
    <select name="courseId">
      {% for c in courses %}
        <option value="{{ c._id }}">{{ c.name }} ({{ c.code }})</option>
      {% endfor %}
    </select>
    <button type="submit">Create</button>
  </form>
</body>
</html>
